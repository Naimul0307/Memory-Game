<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Score Board</title>
  <link rel="stylesheet" href="../css/scoreboard.css">
</head>
<body>
  <div class="scoreboard">

    <h1>🏆 Top 10 Players</h1>

    <table id="scoreTable">
      <thead>
        <tr>
          <th>#</th>
          <th>Name</th>
          <th>Time</th>
          <th>Moves</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button id="homeBtn">⬅ Back to Home</button>

  </div>

  <script src="../js/scoreboard.js"></script>
</body>
</html>
