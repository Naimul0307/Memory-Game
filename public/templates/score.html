<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Top 10 Scorers</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="shortcut icon" href="../background/images.ico" type="image/x-icon">
  <link rel="stylesheet" href="../fontawesome-free-6.7.2/css/all.min.css">
  <link rel="stylesheet" href="../css/score.css">
</head>
<body>
  <h1>Top 10 Scorers</h1>

  <table id="topScorers">
    <thead>
      <tr>
        <th>Rank</th>
        <th>User</th>
        <th>Moves</th>
        <th>Time</th>
      </tr>
    </thead>
    <tbody>
      <!-- Populated by JS -->
    </tbody>
  </table>

  <button id="goHome">Go Home</button>

  <script>
    async function loadTopScores() {
      if (!window.electronAPI || !window.electronAPI.getTopScores) {
        console.error("❌ electronAPI.getTopScores not available");
        document.querySelector("#topScorers tbody").innerHTML = 
          '<tr><td colspan="7">Cannot load scores.</td></tr>';
        return;
      }

      const topScores = await window.electronAPI.getTopScores(10);
      const tbody = document.querySelector("#topScorers tbody");
      tbody.innerHTML = "";

      if (!topScores.length) {
        tbody.innerHTML = '<tr><td colspan="7">No game data found.</td></tr>';
        return;
      }

      topScores.forEach((game, index) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${index + 1}</td>
          <td>${game.User || ""}</td>
          <td>${game.Moves || 0}</td>
          <td>${game.Time || "00:00"}</td>
        `;
        tbody.appendChild(row);
      });
    }

    document.getElementById("goHome").addEventListener("click", () => {
      window.location.href = "index.html";
    });

    document.addEventListener("DOMContentLoaded", loadTopScores);
  </script>
</body>
</html>
